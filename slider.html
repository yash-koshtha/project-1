<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slider_bar</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="main">
        <input type="checkbox" id="check">
        <div class="button_one">
            <label for="check">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>
        <div class="slider">
            <div id="slider_nav">
                <div id="slider_nav1">
                    <div id="photo"></div>
                    <div class="button_two">
                        <label for="check">
                            <i class="fa-solid fa-x"></i>
                        </label>
                    </div>
                </div>
                <div id="slider_nav2">
                <h2>Yash koshtha</h2>
                <h3>Web developer</h3>
                </div>
            </div>
            <div id="slider_contant">
                <ul>
                    <li>
                        <i class="fa-solid fa-circle-user"></i>
                        <a href="#">Profile</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-comment-dots"></i>
                        <a href="#">Messages</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-chart-line"></i>
                        <a href="#">Activity</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-list"></i>
                        <a href="#">Lists</a>
                    </li>
                    <li>
                        <i class="fa-brands fa-reacteurope"></i>
                        <a href="#">Events</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <a href="#">Sign Out</a>
                    </li>
                </ul>
            </div>
            <div id="slider_foot">
                <ul>
                    <li>
                        <i class="fa-solid fa-share-nodes"></i>
                        <a href="#">Tell a Friend</a>
                    </li>
                    <li>
                        <i class="fa-regular fa-circle-question"></i>
                        <a href="#">Help and Feedback</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>

</html>
