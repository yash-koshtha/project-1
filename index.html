<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slide_bar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div id="main">
        <input type="checkbox" id="check">
        <div id="icon_one">
            <label for="check"><i class="fa-solid fa-bars"></i></label>
        </div>
        <div class="slide_bar">
            <div class="slide_nav">
                <div id="logo"><a href="#"><i>Yash</i></a></div>
                <div id="icon_two">
                    <label for="check"><i class="fa-solid fa-xmark"></i></label>
                </div>
            </div>
            <div class="slide_contant">
                <ul>
                    <li><i class="fa-solid fa-images"></i></i>
                        <a href="#">Gallery</a>
                    </li>
                    <li><i class="fa-solid fa-square-up-right"></i>
                        <a href="#">Shortcut</a>
                    </li>
                    <li>
                        <i class="fa-brands fa-alipay"></i>
                        <a href="#">Exhibits</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-calendar-days"></i>
                        <a href="#">Event</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-store"></i>
                        <a href="#">store</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-phone"></i>
                        <a href="#">Contacts</a>
                    </li>
                    <li>
                        <i class="fa-regular fa-comments"></i>
                        <a href="#">Feedback</a>
                    </li>
                </ul>
            </div>
            <div class="slide_footer">
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </div>
    </div>
</body>

</html>
